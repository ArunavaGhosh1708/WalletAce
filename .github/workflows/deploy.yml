name: Deploy WalletAce

on:
  push:
    branches: [main]

env:
  PROJECT_ID: walletace
  REGION: us-central1
  REGISTRY: us-central1-docker.pkg.dev/walletace/walletace

jobs:
  # ── Backend: cards-service ─────────────────────────────────────────────────
  deploy-cards-service:
    name: Deploy cards-service
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push cards-service image
        working-directory: backend/cards-service
        run: |
          docker build -t ${{ env.REGISTRY }}/cards-service:${{ github.sha }} .
          docker push ${{ env.REGISTRY }}/cards-service:${{ github.sha }}

      - name: Deploy cards-service to Cloud Run
        run: |
          gcloud run deploy cards-service \
            --image ${{ env.REGISTRY }}/cards-service:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --set-secrets="DATABASE_URL=DATABASE_URL:latest,DEEPSEEK_API_KEY=DEEPSEEK_API_KEY:latest" \
            --set-env-vars="ENVIRONMENT=production,ALLOWED_ORIGINS=https://walletace.web.app" \
            --project ${{ env.PROJECT_ID }}

  # ── Backend: recommendation-service ───────────────────────────────────────
  deploy-recommendation-service:
    name: Deploy recommendation-service
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push recommendation-service image
        working-directory: backend/recommendation-service
        run: |
          docker build -t ${{ env.REGISTRY }}/recommendation-service:${{ github.sha }} .
          docker push ${{ env.REGISTRY }}/recommendation-service:${{ github.sha }}

      - name: Deploy recommendation-service to Cloud Run
        run: |
          gcloud run deploy recommendation-service \
            --image ${{ env.REGISTRY }}/recommendation-service:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --set-secrets="REDIS_URL=REDIS_URL:latest,DEEPSEEK_API_KEY=DEEPSEEK_API_KEY:latest" \
            --set-env-vars="CARDS_SERVICE_URL=https://cards-service-gdhrpnwqha-uc.a.run.app,ENVIRONMENT=production,ALLOWED_ORIGINS=https://walletace.web.app" \
            --project ${{ env.PROJECT_ID }}

  # ── Frontend: Firebase Hosting ─────────────────────────────────────────────
  deploy-frontend:
    name: Deploy frontend
    runs-on: ubuntu-latest
    needs: [deploy-cards-service, deploy-recommendation-service]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: https://recommendation-service-gdhrpnwqha-uc.a.run.app

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SA_KEY }}
          channelId: live
          projectId: walletace
          entryPoint: ./frontend
